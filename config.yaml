# RoboSpatial Evaluation Configuration

# Dataset paths
datasets:
  robospatial_home:
    # Load RoboSpatial-Home from Hugging Face
    dataset_name: "chanhee-luke/RoboSpatial-Home"

# Output configuration
output:
  output_dir: "./results"  # Full path to where results will be stored
  # If not specified, a 'results' folder will be created in the current directory

# Evaluation configuration
evaluation:
  # For point questions, score against up to this many predicted points.
  num_points_to_match: 2
